name: Project Module Sync

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/project-module-sync.yml"
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]
  pull_request:
    types: [opened, edited, labeled, unlabeled, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  sync:
    name: Sync FRS module field
    runs-on: ubuntu-latest
    env:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
      PROJECT_OWNER: cybertechiesph
      PROJECT_NUMBER: "1"
    steps:
      - name: Sync issues and pull requests to module field
        if: env.ADD_TO_PROJECT_PAT != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const repoOwner = context.repo.owner;
            const repo = context.repo.repo;

            const moduleOptions = [
              {
                name: "Identity and Access Control",
                color: "BLUE",
                patterns: ["identity and access control", "module:identity", "login", "logout", "role-based", "account management"]
              },
              {
                name: "Recruitment Entry and Vacancy Management",
                color: "GREEN",
                patterns: ["recruitment entry and vacancy management", "module:entry-management", "position reference", "vacancy", "opening"]
              },
              {
                name: "Applicant Intake and OTP Verification",
                color: "YELLOW",
                patterns: ["applicant intake and otp verification", "module:intake-otp", "applicant intake", "otp", "status lookup"]
              },
              {
                name: "Recruitment Case Management and Workflow Engine",
                color: "ORANGE",
                patterns: ["recruitment case management and workflow engine", "module:workflow-engine", "workflow engine", "stage progression", "stage-locking"]
              },
              {
                name: "Branch-Aware and Level-Aware Routing",
                color: "RED",
                patterns: ["branch-aware and level-aware routing", "module:routing", "routing", "level 1", "level 2", "secretariat", "hrm chief"]
              },
              {
                name: "Document Review and Qualification Screening",
                color: "PINK",
                patterns: ["document review and qualification screening", "module:screening", "screening", "qualification"]
              },
              {
                name: "Examination Management",
                color: "PINK",
                patterns: ["examination management", "module:examination", "exam", "examination"]
              },
              {
                name: "Interview and Rating Management",
                color: "BLUE",
                patterns: ["interview and rating management", "module:interview-rating", "interview", "rating"]
              },
              {
                name: "Deliberation and Decision Support",
                color: "GREEN",
                patterns: ["deliberation and decision support", "module:deliberation", "deliberation", "comparative assessment", "car"]
              },
              {
                name: "Decision and Approval Handling",
                color: "YELLOW",
                patterns: ["decision and approval handling", "module:decision-approval", "approval", "final decision"]
              },
              {
                name: "Notification Management",
                color: "ORANGE",
                patterns: ["notification management", "module:notifications", "notification", "email"]
              },
              {
                name: "Appointment and Contract Completion",
                color: "RED",
                patterns: ["appointment and contract completion", "module:completion", "completion", "contract"]
              },
              {
                name: "Evidence Vault and Record Management",
                color: "PINK",
                patterns: ["evidence vault and record management", "module:evidence-vault", "evidence vault", "evidence"]
              },
              {
                name: "Audit Logging and Traceability",
                color: "PINK",
                patterns: ["audit logging and traceability", "module:audit-logging", "audit", "traceability"]
              },
              {
                name: "Evidence Export and Integrity Verification",
                color: "BLUE",
                patterns: ["evidence export and integrity verification", "module:export-integrity", "export bundle", "integrity verification", "sha-256"]
              },
              {
                name: "Project Management / Setup",
                color: "GRAY",
                patterns: ["project tracking", "github project", "project board", "deployment readiness", "test suite", "demo data"]
              },
              {
                name: "Unmapped / Triage",
                color: "GRAY",
                patterns: []
              }
            ];

            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            async function loadProject() {
              const result = await github.graphql(projectQuery, {
                login: projectOwner,
                number: projectNumber
              });
              const project = result.user?.projectV2;
              if (!project) {
                throw new Error(`Project not found: ${projectOwner}/${projectNumber}`);
              }
              return project;
            }

            async function ensureModuleField(project) {
              let field = project.fields.nodes.find((node) => node?.name === "Module");
              if (field?.options) {
                return field;
              }

              const created = await github.graphql(`
                mutation($projectId: ID!, $options: [ProjectV2SingleSelectFieldOptionInput!]!) {
                  createProjectV2Field(input: {
                    projectId: $projectId,
                    dataType: SINGLE_SELECT,
                    name: "Module",
                    singleSelectOptions: $options
                  }) {
                    projectV2Field {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              `, {
                projectId: project.id,
                options: moduleOptions.map((option) => ({
                  name: option.name,
                  color: option.color,
                  description: option.name
                }))
              });

              return created.createProjectV2Field.projectV2Field;
            }

            function moduleForContent(content) {
              const labels = (content.labels || [])
                .map((label) => typeof label === "string" ? label : label.name)
                .filter(Boolean)
                .join("\n");
              const haystack = [
                content.title || "",
                content.body || "",
                labels
              ].join("\n").toLowerCase();

              for (const option of moduleOptions) {
                if (option.name === "Unmapped / Triage") continue;
                if (option.patterns.some((pattern) => haystack.includes(pattern))) {
                  return option.name;
                }
              }
              return "Unmapped / Triage";
            }

            async function getProjectItem(projectId, contentId) {
              let cursor = null;
              do {
                const result = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                              }
                              ... on PullRequest {
                                id
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId, cursor });

                for (const item of result.node.items.nodes) {
                  if (item.content?.id === contentId) {
                    return item;
                  }
                }

                cursor = result.node.items.pageInfo.hasNextPage
                  ? result.node.items.pageInfo.endCursor
                  : null;
              } while (cursor);

              return null;
            }

            async function addProjectItem(projectId, contentId) {
              const existing = await getProjectItem(projectId, contentId);
              if (existing) {
                return existing;
              }

              try {
                const result = await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {
                      projectId: $projectId,
                      contentId: $contentId
                    }) {
                      item {
                        id
                      }
                    }
                  }
                `, { projectId, contentId });

                return result.addProjectV2ItemById.item;
              } catch (error) {
                const existingAfterRace = await getProjectItem(projectId, contentId);
                if (existingAfterRace) {
                  return existingAfterRace;
                }
                throw error;
              }
            }

            async function setModule(projectId, itemId, field, moduleName) {
              const optionId = field.options.find((option) => option.name === moduleName)?.id;
              if (!optionId) {
                throw new Error(`Module option missing: ${moduleName}`);
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: {
                      singleSelectOptionId: $optionId
                    }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `, {
                projectId,
                itemId,
                fieldId: field.id,
                optionId
              });
            }

            async function listOpenRepoContent() {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: repoOwner,
                repo,
                state: "open",
                per_page: 100
              });
              const openIssues = issues.filter((issue) => !issue.pull_request);

              const pulls = await github.paginate(github.rest.pulls.list, {
                owner: repoOwner,
                repo,
                state: "open",
                per_page: 100
              });

              return [...openIssues, ...pulls];
            }

            async function eventContent() {
              if (context.payload.issue) return [context.payload.issue];
              if (context.payload.pull_request) return [context.payload.pull_request];
              return listOpenRepoContent();
            }

            const project = await loadProject();
            const moduleField = await ensureModuleField(project);
            const contents = await eventContent();

            for (const content of contents) {
              const contentId = content.node_id;
              if (!contentId) {
                core.warning(`Skipping item without node_id: ${content.title}`);
                continue;
              }

              const moduleName = moduleForContent(content);
              const item = await addProjectItem(project.id, contentId);
              await setModule(project.id, item.id, moduleField, moduleName);
              core.info(`Synced ${content.title} -> ${moduleName}`);
            }

      - name: Missing token notice
        if: env.ADD_TO_PROJECT_PAT == ''
        run: |
          echo "ADD_TO_PROJECT_PAT is not configured. Project module sync was skipped."
