{# Parameters: stage_title, locked_message (optional) #}
<div class="rg-cws-locked-frame">
    <div class="rg-cws-lock-ribbon" aria-hidden="true">Locked</div>
    <div class="rg-cws-locked-frame__content">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="#5f6c78" stroke-width="1.5"/>
                <path d="M5 7V5.5a3 3 0 0 1 6 0V7" stroke="#5f6c78" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span style="font-size:0.875rem;font-weight:600;color:#111827;">{{ stage_title }}</span>
        </div>
        <p style="font-size:0.8125rem;color:#5f6c78;margin:0;">
            {{ locked_message|default:"This stage output is finalized and locked. No further edits are permitted." }}
        </p>
    </div>
</div>
