{% comment %}Primary CTA button. Params: button_url, button_label{% endcomment %}<table role="presentation" cellspacing="0" cellpadding="0" style="margin:18px 0 4px;">
    <tr>
        <td style="background:#1e5c2d; border-radius:7px;">
            <a href="{{ button_url }}" style="display:inline-block; padding:12px 22px; color:#ffffff; font-size:14px; line-height:1.4; font-weight:700; text-decoration:none;">{{ button_label }}</a>
        </td>
    </tr>
</table>
